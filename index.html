<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass Calculator</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
    font-family: 'Poppins', sans-serif;
}

/* Liquid Glass Card */
.calculator {
    position: relative;
    width: 320px;
    padding: 20px;
    border-radius: 25px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(25px);
    box-shadow:
        inset 0 0 30px rgba(255,255,255,0.1),
        0 0 40px rgba(0, 150, 255, 0.2),
        0 10px 40px rgba(0,0,0,0.6);
}

/* Glow border */
.calculator::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 25px;
    padding: 2px;
    background: linear-gradient(120deg, #00f2ff, #ff00c8, #00ff88);
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
}

/* Display */
#display {
    width: 100%;
    height: 70px;
    border: none;
    outline: none;
    border-radius: 15px;
    font-size: 26px;
    padding: 10px;
    text-align: right;
    background: rgba(255,255,255,0.08);
    color: #fff;
    margin-bottom: 15px;
    box-shadow: inset 0 0 10px rgba(255,255,255,0.1);
}

/* Buttons grid */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

/* Base button */
button {
    height: 60px;
    border: none;
    border-radius: 15px;
    font-size: 18px;
    color: white;
    background: rgba(255,255,255,0.08);
    cursor: pointer;
    transition: 0.2s;
    backdrop-filter: blur(10px);
}

/* Hover + press feel */
button:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.15);
}

button:active {
    transform: scale(0.95);
}

/* Special buttons */
.operator {
    background: linear-gradient(45deg, #ff9966, #ff5e62);
}

.equal {
    background: linear-gradient(45deg, #00dbde, #fc00ff);
    grid-column: span 2;
}

.clear {
    background: linear-gradient(45deg, #ff416c, #ff4b2b);
}

.delete {
    background: linear-gradient(45deg, #f7971e, #ffd200);
    color: black;
}
</style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" disabled>

    <div class="buttons">
        <button onclick="clearDisplay()" class="clear">C</button>
        <button onclick="deleteLast()" class="delete">DEL</button>
        <button onclick="append('%')">%</button>
        <button onclick="append('/')" class="operator">/</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('*')" class="operator">*</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('-')" class="operator">-</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('+')" class="operator">+</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button onclick="calculate()" class="equal">=</button>
    </div>
</div>

<script>
function append(value) {
    document.getElementById("display").value += value;
}

function clearDisplay() {
    document.getElementById("display").value = "";
}

function deleteLast() {
    let current = document.getElementById("display").value;
    document.getElementById("display").value = current.slice(0, -1);
}

function calculate() {
    try {
        let result = eval(document.getElementById("display").value);
        document.getElementById("display").value = result;
    } catch {
        alert("Invalid");
    }
}
</script>

</body>
</html>
